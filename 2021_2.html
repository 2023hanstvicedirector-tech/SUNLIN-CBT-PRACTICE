<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2021 안경사 국가고시 CBT - 2교시 최종 마스터 모드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-wrapper { display: flex; width: 100%; max-width: 1100px; gap: 20px; }
        .quiz-container { flex: 7; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 500px; }
        .question { font-size: 1.25em; font-weight: bold; margin-bottom: 25px; color: #222; white-space: pre-line; line-height: 1.5; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #e9ecef; }
        .btn-container { display: flex; align-items: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: 0.15s; }
        .btn:hover { background: #004494; }
        .btn.secondary { background: #6c757d; }
        .btn.secondary:hover { background: #5a6268; }
        .btn.danger { background: #d9534f; }
        .btn.danger:hover { background: #c9302c; }
        #answer-display { font-size: 1.15em; font-weight: bold; color: #d9534f; margin-left: 10px; }
        .sidebar { flex: 3; display: flex; flex-direction: column; gap: 20px; min-width: 280px; }
        .timer-box { background: #212529; color: #00ffcc; padding: 20px; text-align: center; border-radius: 10px; font-size: 1.8em; font-family: 'Courier New', monospace; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .timer-label { font-size: 0.4em; color: #aaa; display: block; margin-bottom: 5px; font-family: 'Malgun Gothic'; }
        .omr-box { background: white; border: 1px solid #ced4da; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .omr-box h4 { margin: 0 0 10px 0; color: #495057; text-align: center; }
        .omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 250px; overflow-y: auto; padding-right: 4px; }
        .omr-btn { padding: 8px 0; font-size: 0.85em; font-weight: bold; border: 1px solid #ced4da; background: #fff; border-radius: 4px; cursor: pointer; text-align: center; color: #495057; transition: 0.15s; }
        .omr-btn:hover { background: #e9ecef; }
        .omr-btn.answered { background: #0056b3; color: white; border-color: #004494; }
        .omr-btn.current { outline: 3px solid #ffc107; outline-offset: -3px; }
        .calc-box { background: #f8f9fa; border: 1px solid #ced4da; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .calc-box h4 { margin: 0 0 10px 0; color: #495057; text-align: center; }
        #calc-screen { width: 100%; height: 45px; background: white; border: 1px solid #ced4da; border-radius: 5px; margin-bottom: 10px; font-size: 1.4em; text-align: right; padding: 5px 10px; box-sizing: border-box; font-family: monospace; }
        .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { padding: 12px; font-size: 1.1em; font-weight: bold; background: white; border: 1px solid #dee2e6; border-radius: 5px; cursor: pointer; }
        .calc-btn:hover { background: #e9ecef; }
        .calc-btn.operator { background: #e8f4fd; color: #0056b3; }
        .calc-btn.clear { background: #fff5f5; color: #d9534f; }
        .calc-btn.equal { background: #0056b3; color: white; grid-column: span 2; }
        .wrong-box { margin-bottom: 20px; padding: 15px; background: #fff5f5; border-left: 5px solid #d9534f; border-radius: 4px; }
        .wrong-title { font-weight: bold; color: #333; margin-bottom: 8px; white-space: pre-line; line-height: 1.4; }
        .my-ans { color: #d9534f; font-weight: bold; margin: 4px 0; }
        .correct-ans { color: #2b8a3e; font-weight: bold; margin: 4px 0; }

        /* 🎨 안광학 전용 그래픽 시표 시뮬레이터 벡터 그래픽 스타일링 */
        .diagram-container { background: #ffffff; border: 2px dashed #999; border-radius: 8px; padding: 15px; margin: 15px 0; display: inline-block; text-align: center; }
        .lens-axis-circle { width: 160px; height: 160px; border: 2px solid #333; border-radius: 50%; position: relative; background: #fafafa; display: inline-block; }
        .axis-line { position: absolute; background: #ff0000; height: 2px; top: 50%; left: 0; right: 0; transform-origin: 50% 50%; }
        .target-dot { position: absolute; width: 8px; height: 8px; background: #00cc00; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .grid-circle { position: absolute; border: 1px dashed #bbb; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .main-wrapper { flex-direction: column; gap: 15px; }
            .quiz-container { padding: 20px; min-height: auto; }

            .timer-box { padding: 15px; font-size: 1.5em; }
            .omr-grid { grid-template-columns: repeat(10, 1fr); max-height: 150px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="quiz-container">
        <h2>2021 제34회 안경사 국가고시 - 2교시 (의료관계법규 / 시광학응용)</h2>
        <div style="font-size:0.9em; color:#666; margin-bottom:10px;" id="progress-display">문항 수 계산 중...</div>
        <hr>
        <div id="quiz-area">
            <div id="question-text" class="question">문제가 여기에 표시됩니다.</div>
            <div id="diagram-area"></div>
            <div id="options-area" class="options"></div>
            <div class="btn-container">
                <button class="btn secondary" onclick="prevQuestion()">이전 문제</button>
                <button class="btn" onclick="nextQuestion()">다음 문제</button>
                <button class="btn secondary" onclick="showAnswer()">답 보기</button>
                <button class="btn danger" onclick="confirmSubmit()" style="margin-left: auto;">시험 종료</button>
                <span id="answer-display"></span>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="timer-box">
            <span class="timer-label">경과 시간</span>
            <span id="timer-display">00:00</span>
        </div>
        <div class="omr-box">
            <h4>문항 바로가기 (OMR)</h4>

        </div>
        <div class="calc-box">

            <div class="calc-buttons">
                <button class="calc-btn clear" onclick="clearCalc()">C</button>
                <button class="calc-btn operator" onclick="appendCalc('/')">÷</button>
                <button class="calc-btn operator" onclick="appendCalc('*')">×</button>
                <button class="calc-btn operator" onclick="appendCalc('-')">-</button>

                <button class="calc-btn" onclick="appendCalc('8')">8</button>
                <button class="calc-btn" onclick="appendCalc('9')">9</button>
                <button class="calc-btn operator" onclick="appendCalc('+')">+</button>
                <button class="calc-btn" onclick="appendCalc('4')">4</button>
                <button class="calc-btn" onclick="appendCalc('5')">5</button>
                <button class="calc-btn" onclick="appendCalc('6')">6</button>
                <button class="calc-btn" onclick="appendCalc('.')">.</button>
                <button class="calc-btn" onclick="appendCalc('1')">1</button>
                <button class="calc-btn" onclick="appendCalc('2')">2</button>
                <button class="calc-btn" onclick="appendCalc('3')">3</button>
                <button class="calc-btn" onclick="appendCalc('0')">0</button>
                <button class="calc-btn equal" onclick="calculate()">=</button>
            </div>
        </div>
    </div>
</div>

            "options": ["완충제", "칼슘제거제", "효소세척제", "계면활성제", "삼투압조절제"],
            "answer": 3
        },
        {

            "question": "101. 망원경식 렌즈미터에서 눈의 조절 개입을 방지하는 시도조정환이 있는 곳은?",
            "options": ["조명부", "망원경부", "수치읽음부", "접안렌즈부", "콜리메이터부"],
            "answer": 3
        },
        {
            "id": 102,
            "question": "102. 각막곡률계(keratometer)의 주 용도는?",
            "options": ["각막굴절률 측정", "각막상피 두께 측정", "각막내피 두께 측정", "각막 전면곡률반경 측정", "각막 후면곡률반경 측정"],
            "answer": 3
        },
        {
            "id": 103,
            "question": "103. 포롭터가 수평 정렬 수포 눈금계 기준에서 벗어나 기울어져 세팅되었을 때, 바르게 정렬하기 위하여 회전 조작해야 하는 것은?",
            "options": ["A (정치 평형 손잡이)", "B", "C", "D", "E"],
            "answer": 0
        },
        {
            "id": 104,
            "question": "104. 망원경식 렌즈미터의 콜리메이터부에서 나온 평행광선이 망원경부의 대물렌즈에 의해서 수렴 후 결상되는 곳은?",
            "options": ["타깃", "표준렌즈", "접안렌즈", "프리즘렌즈", "핀트글라스"],
            "answer": 4
        },
        {
            "id": 105,
            "question": "105. 플루오레신으로 눈물을 염색한 후 각막 접촉면이나 찰상 상태를 세극등현미경을 사용해 관찰하기 위해 미세 대비 감도를 높여주는 필터는?",
            "options": ["적색 필터", "회색 필터", "청색(코발트) 필터", "백색 필터", "검정색 필터"],
            "answer": 2
        }
    ];

    let userAnswers = new Array(testData.length).fill(null);
    let currentQuestionIndex = 0;
    let totalSeconds = 0;
    let timerInterval = null;

    function startTimer() {
        timerInterval = setInterval(() => {
            totalSeconds++;
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${minutes}:${seconds}`;
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); }

    function buildOMRGrid() {
        const container = document.getElementById('omr-grid-container');
        container.innerHTML = '';
        testData.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.className = 'omr-btn';
            btn.id = `omr-btn-${idx}`;
            btn.innerText = idx + 1;
            btn.onclick = () => goToQuestion(idx);
            container.appendChild(btn);
        });
        updateOMRGrid();
    }

    function updateOMRGrid() {
        testData.forEach((_, idx) => {
            const btn = document.getElementById(`omr-btn-${idx}`);
            if (!btn) return;
            if (userAnswers[idx] !== null) btn.classList.add('answered');
            else btn.classList.remove('answered');
            if (idx === currentQuestionIndex) btn.classList.add('current');
            else btn.classList.remove('current');
        });
    }

    function selectOption(index) {
        userAnswers[currentQuestionIndex] = index;
        updateOMRGrid();
    }

    // 🛠️ 대화형 안광학 벡터 그래픽 시표 시뮬레이션 렌더링 엔진
    function renderDiagram(type) {
        const area = document.getElementById('diagram-area');
        area.innerHTML = '';
        if (!type) return;

        const container = document.createElement('div');
        container.className = 'diagram-container';

        if (type === 'dbl') {
            container.innerHTML = `<svg width="220" height="70">
                <rect x="10" y="10" width="70" height="50" rx="5" fill="none" stroke="#333" stroke-width="2"/>
                <rect x="140" y="10" width="70" height="50" rx="5" fill="none" stroke="#333" stroke-width="2"/>
                <line x1="80" y1="35" x2="140" y2="35" stroke="#ff0000" stroke-width="3" stroke-dasharray="4"/>
                <text x="100" y="28" fill="#ff0000" font-weight="bold">(나)</text>
                <text x="35" y="40" font-size="12">(가)</text><text x="165" y="40" font-size="12">(다)</text>
            </svg><br><span style="font-size:0.85em;color:#555;">[박싱 규격 안경테 연결부 도해]</span>`;
        } else if (type === 'min_dia') {
            container.innerHTML = `<svg width="180" height="120">
                <rect x="20" y="20" width="140" height="80" fill="none" stroke="#444" stroke-width="2"/>
                <circle cx="80" cy="60" r="45" fill="none" stroke="#0056b3" stroke-width="2"/>
                <circle cx="90" cy="60" r="4" fill="#ff0000"/>
                <line x1="20" y1="60" x2="160" y2="60" stroke="#bbb" stroke-width="1"/>
                <text x="95" y="55" fill="#ff0000" font-size="11">동공 중심</text>
            </svg>`;
        } else if (type === 'chart_oh') {
            container.innerHTML = `<svg width="200" height="100">
                <line x1="10" y1="50" x2="190" y2="50" stroke="#000" stroke-width="2"/>
                <line x1="10" y1="10" x2="190" y2="10" stroke="#aaa" stroke-dasharray="2"/>
                <line x1="10" y1="90" x2="190" y2="90" stroke="#aaa" stroke-dasharray="2"/>
                <circle cx="100" cy="30" r="6" fill="#ff0000"/>
                <line x1="100" y1="50" x2="100" y2="30" stroke="#ff0000" stroke-width="2"/>
                <text x="110" y="35" fill="#ff0000" font-size="12">Oh 가공선 (25mm)</text>
            </svg>`;
        } else if (type === 'target_dot_loc') {
            container.innerHTML = `<svg width="160" height="100">
                <rect x="10" y="10" width="140" height="80" fill="none" stroke="#333" stroke-width="1.5"/>
                <line x1="10" y1="50" x2="150" y2="50" stroke="#aaa"/>
                <line x1="80" y1="10" x2="80" y2="90" stroke="#aaa"/>
                <circle cx="65" cy="40" r="5" fill="#0056b3"/>
                <text x="55" y="30" font-size="11" fill="#0056b3">(나)</text>
            </svg>`;
        } else if (type === 'lensmeter_target1') {
            container.innerHTML = `<div class="lens-axis-circle">
                <div class="grid-circle" style="width:40px;height:40px;"></div>
                <div class="grid-circle" style="width:80px;height:80px;"></div>
                <div class="grid-circle" style="width:120px;height:120px;"></div>
                <div class="target-dot" style="transform: translate(25px, -4px);"></div>
                <div class="axis-line" style="transform: rotate(180deg);"></div>
            </div><br><span style="font-size:0.85em;color:#444;">[오른쪽 렌즈 프리즘 측정 타깃]</span>`;
        } else if (type === 'lensmeter_target2') {
            container.innerHTML = `<div class="lens-axis-circle">
                <div class="grid-circle" style="width:50px;height:50px;"></div>
                <div class="grid-circle" style="width:100px;height:100px;"></div>
                <div class="target-dot" style="transform: translate(-30px, -25px);"></div>
                <div class="axis-line" style="transform: rotate(60deg);"></div>
            </div>`;
        } else if (type === 'progressive_oh') {
            container.innerHTML = `<svg width="180" height="120">
                <circle cx="90" cy="45" r="15" fill="none" stroke="#666" stroke-width="1"/>
                <circle cx="90" cy="45" r="2" fill="#ff0000"/>
                <path d="M 60,75 Q 90,55 120,75" fill="none" stroke="#333" stroke-width="1.5"/>
                <circle cx="90" cy="85" r="12" fill="none" stroke="#666" stroke-dasharray="2"/>
                <text x="95" y="42" font-size="11" fill="#ff0000">(나) 원용아이포인트</text>
            </svg>`;
        } else if (type === 'nosepad_align') {
            container.innerHTML = `<svg width="240" height="70">
                <g transform="translate(20,5)">
                    <rect x="5" y="10" width="30" height="40" rx="8" fill="none" stroke="#000"/>
                    <rect x="45" y="10" width="30" height="40" rx="8" fill="none" stroke="#000"/>
                    <text x="27" y="62" font-size="11">③ 비대칭 협소</text>
                </g>
            </svg>`;
        } else if (type === 'maddox_vert') {
            container.innerHTML = `<div style="width:140px;height:140px;background:#000;border-radius:5px;position:relative;display:inline-block;">
                <circle cx="70" cy="70" r="4" fill="#fff" style="box-shadow:0 0 10px #fff"/>
                <line x1="70" y1="10" x2="70" y2="130" stroke="#ff0000" stroke-width="2"/>
            </div>`;
        } else if (type === 'worth4dot') {
            container.innerHTML = `<div style="width:120px;height:120px;background:#111;border-radius:50%;position:relative;display:inline-block;">
                <circle cx="60" cy="25" r="8" fill="#ff3333"/>
                <circle cx="35" cy="60" r="8" fill="#33ff33"/>
                <circle cx="85" cy="60" r="8" fill="#33ff33"/>
                <circle cx="60" cy="95" r="8" fill="#33ff33"/>
            </div>`;
        } else if (type === 'hirschberg') {
            container.innerHTML = `<svg width="200" height="90">
                <circle cx="50" cy="45" r="30" fill="#e9ecef" stroke="#333"/>
                <circle cx="50" cy="45" r="12" fill="#212529"/>
                <circle cx="50" cy="45" r="2" fill="#fff"/>
                <circle cx="150" cy="45" r="30" fill="#e9ecef" stroke="#333"/>
                <circle cx="150" cy="45" r="12" fill="#212529"/>
                <circle cx="156" cy="45" r="2" fill="#fff"/>
                <text x="35" y="88" font-size="11">오른쪽(OD)</text>
                <text x="135" y="88" font-size="11">왼쪽(OS)</text>

        area.appendChild(container);
    }

    function loadQuestion() {
        const qText = document.getElementById('question-text');
        const optArea = document.getElementById('options-area');
        const progressDisplay = document.getElementById('progress-display');
        
        document.getElementById('answer-display').innerText = '';
        progressDisplay.innerText = `현재 진행률: ${currentQuestionIndex + 1} / ${testData.length} 문항`;
        const currentQ = testData[currentQuestionIndex];
        qText.innerText = currentQ.question;
        
        激활성화(currentQ.diagram);
        optArea.innerHTML = '';

        currentQ.options.forEach((opt, index) => {
            const label = document.createElement('label');
            const isChecked = userAnswers[currentQuestionIndex] === index ? 'checked' : '';
            label.innerHTML = `<input type="radio" name="option" value="${index}" ${isChecked} onchange="selectOption(${index})"> <strong>${index + 1}번.</strong> ${opt}`;
            optArea.appendChild(label);
        });
        updateOMRGrid();
    }

    function 激활성화(diagramType) {
        renderDiagram(diagramType);
    }

    function showAnswer() {
        if (currentQuestionIndex < testData.length) {
            const currentQ = testData[currentQuestionIndex];
            document.getElementById('answer-display').innerText = ` 정답: ${currentQ.answer + 1}번`;
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < testData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            confirmSubmit();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function goToQuestion(index) {
        currentQuestionIndex = index;
        loadQuestion();
    }

    function confirmSubmit() {
        const unansweredCount = userAnswers.filter(ans => ans === null).length;
        let alertMsg = "시험을 최종 제출하시겠습니까?";
        if (unansweredCount > 0) alertMsg = `미답변 문항이 ${unansweredCount}개 있습니다. 이대로 ${alertMsg}`;
        if (confirm(alertMsg)) submitExam();
    }

    function submitExam() {
        stopTimer();
        let score = 0;
        let incorrectQuestions = [];

        testData.forEach((q, idx) => {
            if (userAnswers[idx] === q.answer) score++;
            else {
                incorrectQuestions.push({
                    id: q.id,
                    question: q.question,
                    options: q.options,
                    userAnswer: userAnswers[idx],
                    correctAnswer: q.answer
                });
            }
        });

        document.getElementById('progress-display').innerText = "시험 종료";
        let resultHTML = `<h3>📝 채점 결과</h3>`;
        resultHTML += `<p style="font-size: 1.2em;">총 <strong>${testData.length}</strong>문항 중 <strong>${score}</strong>문항 합격 달성!</p><hr>`;
        
        if (incorrectQuestions.length > 0) {
            resultHTML += `<h3 style="color:#d9534f;">❌ 오답 검토 리스트</h3>`;
            incorrectQuestions.forEach((q) => {
                const userAnsText = q.userAnswer !== null ? `(${q.userAnswer + 1}번) ${q.options[q.userAnswer]}` : "선택 안 함";
                resultHTML += `
                    <div class="wrong-box">
                        <div class="wrong-title">${q.question}</div>
                        <div class="my-ans">❌ 선택한 답: ${userAnsText}</div>
                        <div class="correct-ans">⭕ 정답: (${q.correctAnswer + 1}번) ${q.options[q.correctAnswer]}</div>
                    </div>`;
            });
        } else {
            resultHTML += `<h3 style="color:#2b8a3e;">🎉 축하합니다! 만점입니다.</h3>`;
        }
        document.getElementById('quiz-area').innerHTML = resultHTML;
    }

    /* --- 계산기 엔진 모듈 --- */
    let calcExpression = '';
    const screen = document.getElementById('calc-screen');
    function appendCalc(val) {
        if (screen.value === '0' && !isNaN(val)) calcExpression = val;
        else calcExpression += val;
        screen.value = calcExpression;
    }
    function clearCalc() { calcExpression = ''; screen.value = '0'; }
    function calculate() {
        try {
            const sanitized = calcExpression.replace(/[^0-9+\-*/.]/g, '');
            const res = new Function(`return (${sanitized})`)();
            screen.value = Number(res.toFixed(4));
            calcExpression = screen.value;
        } catch (e) { screen.value = '오류'; calcExpression = ''; }
    }

    // 초기 실행구동
    buildOMRGrid();
    loadQuestion();
    startTimer();
</script>
