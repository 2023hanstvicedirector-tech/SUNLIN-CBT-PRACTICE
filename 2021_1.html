<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        /* 전체 레이아웃 (왼쪽: 문제, 오른쪽: 사이드바) */
        .main-wrapper { display: flex; width: 100%; max-width: 1100px; gap: 20px; }
        
        /* 문제 영역 */
        .quiz-container { flex: 7; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 500px; }
        .question { font-size: 1.25em; font-weight: bold; margin-bottom: 25px; color: #222; white-space: pre-line; line-height: 1.5; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #e9ecef; }
        
        /* 하단 버튼 영역 구조 */
        .btn-container { display: flex; align-items: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: 0.15s; }
        .btn:hover { background: #004494; }
        
        /* 보조 버튼 스타일 */
        .btn.secondary { background: #6c757d; }
        .btn.secondary:hover { background: #5a6268; }
        .btn.danger { background: #d9534f; }
        .btn.danger:hover { background: #c9302c; }

        /* 정답 텍스트 노출 스타일 */
        #answer-display { font-size: 1.15em; font-weight: bold; color: #d9534f; margin-left: 10px; }

        /* 오른쪽 사이드바 (타이머 + OMR + 계산기) */
        .sidebar { flex: 3; display: flex; flex-direction: column; gap: 20px; min-width: 280px; }
        
        /* 타이머 디자인 */
        .timer-box { background: #212529; color: #00ffcc; padding: 20px; text-align: center; border-radius: 10px; font-size: 1.8em; font-family: 'Courier New', monospace; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .timer-label { font-size: 0.4em; color: #aaa; display: block; margin-bottom: 5px; font-family: 'Malgun Gothic'; }

        /* OMR 바로가기 패널 디자인 */
        .omr-box { background: white; border: 1px solid #ced4da; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .omr-box h4 { margin: 0 0 10px 0; color: #495057; text-align: center; }
        .omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 250px; overflow-y: auto; padding-right: 4px; }
        .omr-btn { padding: 8px 0; font-size: 0.85em; font-weight: bold; border: 1px solid #ced4da; background: #fff; border-radius: 4px; cursor: pointer; text-align: center; color: #495057; transition: 0.15s; }
        .omr-btn:hover { background: #e9ecef; }
        .omr-btn.answered { background: #0056b3; color: white; border-color: #004494; }
        .omr-btn.current { outline: 3px solid #ffc107; outline-offset: -3px; }

        /* 계산기 디자인 */
        .calc-box { background: #f8f9fa; border: 1px solid #ced4da; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .calc-box h4 { margin: 0 0 10px 0; color: #495057; text-align: center; }
        #calc-screen { width: 100%; height: 45px; background: white; border: 1px solid #ced4da; border-radius: 5px; margin-bottom: 10px; font-size: 1.4em; text-align: right; padding: 5px 10px; box-sizing: border-box; font-family: monospace; }
        .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { padding: 12px; font-size: 1.1em; font-weight: bold; background: white; border: 1px solid #dee2e6; border-radius: 5px; cursor: pointer; }
        .calc-btn:hover { background: #e9ecef; }
        .calc-btn.operator { background: #e8f4fd; color: #0056b3; }
        .calc-btn.clear { background: #fff5f5; color: #d9534f; }
        .calc-btn.equal { background: #0056b3; color: white; grid-column: span 2; }

        /* 오답 노트 스타일 */
        .wrong-box { margin-bottom: 20px; padding: 15px; background: #fff5f5; border-left: 5px solid #d9534f; border-radius: 4px; }
        .wrong-title { font-weight: bold; color: #333; margin-bottom: 8px; white-space: pre-line; line-height: 1.4; }
        .my-ans { color: #d9534f; font-weight: bold; margin: 4px 0; }
        .correct-ans { color: #2b8a3e; font-weight: bold; margin: 4px 0; }

        /* 📱 반응형 코드 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .main-wrapper { flex-direction: column; gap: 15px; }
            .quiz-container { padding: 20px; min-height: auto; }

            .timer-box { padding: 15px; font-size: 1.5em; }
            .omr-grid { grid-template-columns: repeat(10, 1fr); max-height: 150px; }
            .calc-box { padding: 12px; }
            .calc-btn { padding: 10px; font-size: 1em; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">

                <button class="btn secondary" onclick="showAnswer()">답 보기</button>
                <button class="btn danger" onclick="confirmSubmit()" style="margin-left: auto;">시험 종료</button>
                <span id="answer-display"></span>
            </div>
        </div>
    </div>

    <div class="sidebar">

            <input type="text" id="calc-screen" readonly value="0">
            <div class="calc-buttons">
                <button class="calc-btn clear" onclick="clearCalc()">C</button>
                <button class="calc-btn operator" onclick="appendCalc('/')">÷</button>
                <button class="calc-btn operator" onclick="appendCalc('*')">×</button>
                <button class="calc-btn operator" onclick="appendCalc('-')">-</button>

                <button class="calc-btn" onclick="appendCalc('8')">8</button>
                <button class="calc-btn" onclick="appendCalc('9')">9</button>
                <button class="calc-btn operator" onclick="appendCalc('+')">+</button>
                
                <button class="calc-btn" onclick="appendCalc('4')">4</button>
                <button class="calc-btn" onclick="appendCalc('5')">5</button>
                <button class="calc-btn" onclick="appendCalc('6')">6</button>
                <button class="calc-btn" onclick="appendCalc('.')">.</button>
                
                <button class="calc-btn" onclick="appendCalc('1')">1</button>
                <button class="calc-btn" onclick="appendCalc('2')">2</button>
                <button class="calc-btn" onclick="appendCalc('3')">3</button>
                <button class="calc-btn" onclick="appendCalc('0')">0</button>
                
                <button class="calc-btn equal" onclick="calculate()">=</button>
            </div>
        </div>
    </div>
</div>

    let userAnswers = new Array(testData.length).fill(null);
    let currentQuestionIndex = 0;
    let totalSeconds = 0;
    let timerInterval = null;

    function startTimer() {
        timerInterval = setInterval(() => {
            totalSeconds++;
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${minutes}:${seconds}`;
            localStorage.setItem('cbt_21_1_seconds', totalSeconds);
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    function buildOMRGrid() {
        const container = document.getElementById('omr-grid-container');
        container.innerHTML = '';
        testData.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.className = 'omr-btn';
            btn.id = `omr-btn-${idx}`;
            btn.innerText = idx + 1;
            btn.onclick = () => goToQuestion(idx);
            container.appendChild(btn);
        });
        updateOMRGrid();
    }

    function updateOMRGrid() {
        testData.forEach((_, idx) => {
            const btn = document.getElementById(`omr-btn-${idx}`);
            if (!btn) return;

            if (userAnswers[idx] !== null) {
                btn.classList.add('answered');
            } else {
                btn.classList.remove('answered');
            }

            if (idx === currentQuestionIndex) {
                btn.classList.add('current');
            } else {
                btn.classList.remove('current');
            }
        });
    }

    function selectOption(index) {
        userAnswers[currentQuestionIndex] = index;
        saveProgress();
        updateOMRGrid();
    }

    function loadQuestion() {
        const qText = document.getElementById('question-text');
        const optArea = document.getElementById('options-area');
        const progressDisplay = document.getElementById('progress-display');
        
        document.getElementById('answer-display').innerText = '';
        progressDisplay.innerText = `현재 진행률: ${currentQuestionIndex + 1} / ${testData.length} 문항`;
        const currentQ = testData[currentQuestionIndex];
        qText.innerText = currentQ.question;
        optArea.innerHTML = '';

        currentQ.options.forEach((opt, index) => {
            const label = document.createElement('label');
            const isChecked = userAnswers[currentQuestionIndex] === index ? 'checked' : '';
            label.innerHTML = `<input type="radio" name="option" value="${index}" ${isChecked} onchange="selectOption(${index})"> <strong>${index + 1}번.</strong> ${opt}`;
            optArea.appendChild(label);
        });

        updateOMRGrid();
    }

    function showAnswer() {
        if (currentQuestionIndex < testData.length) {
            const currentQ = testData[currentQuestionIndex];
            document.getElementById('answer-display').innerText = ` 정답: ${currentQ.answer + 1}번`;
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < testData.length - 1) {
            currentQuestionIndex++;
            saveProgress();
            loadQuestion();
        } else {
            confirmSubmit();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            saveProgress();
            loadQuestion();
        }
    }

    function goToQuestion(index) {
        currentQuestionIndex = index;
        saveProgress();
        loadQuestion();
    }

    function confirmSubmit() {
        const unansweredCount = userAnswers.filter(ans => ans === null).length;
        let alertMsg = "시험을 최종 종료하고 제출하시겠습니까?";
        if (unansweredCount > 0) {
            alertMsg = `아직 답을 고르지 않은 문제가 ${unansweredCount}개 있습니다. 이대로 ${alertMsg}`;
        }

        if (confirm(alertMsg)) {
            submitExam();
        }
    }

    function submitExam() {
        stopTimer();
        
        let score = 0;
        let incorrectQuestions = [];

        testData.forEach((q, idx) => {
            if (userAnswers[idx] === q.answer) {
                score++;
            } else {
                incorrectQuestions.push({
                    question: q.question,
                    options: q.options,
                    userAnswer: userAnswers[idx],
                    correctAnswer: q.answer
                });
            }
        });

        document.getElementById('progress-display').innerText = "시험 종료";
        
        let resultHTML = `<h3>📝 시험 결과</h3>`;
        resultHTML += `<p style="font-size: 1.2em;">총 <strong>${testData.length}</strong>문제 중 <strong>${score}</strong>문제 맞혔습니다.</p>`;
        resultHTML += `<p style="color: #666;">총 소요 시간: <strong>${document.getElementById('timer-display').innerText}</strong></p><hr>`;
        
        if (incorrectQuestions.length > 0) {
            resultHTML += `<h3 style="color: #d9534f; margin-top: 25px;">❌ 틀린 문제 다시보기 (${incorrectQuestions.length}문항)</h3>`;
            incorrectQuestions.forEach((q) => {
                const userAnsText = q.userAnswer !== null ? `(선택 ${q.userAnswer + 1}) ${q.options[q.userAnswer]}` : "선택 안 함 (넘어감)";
                resultHTML += `
                    <div class="wrong-box">
                        <div class="wrong-title">${q.question}</div>
                        <div class="my-ans">❌ 내가 고른 답: ${userAnsText}</div>
                        <div class="correct-ans">⭕ 실제 정답: (보기 ${q.correctAnswer + 1}) ${q.options[q.correctAnswer]}</div>
                    </div>
                `;
            });
        } else {
            resultHTML += `<h3 style="color: #2b8a3e; margin-top: 25px;">🎉 만점입니다! 최고의 실력입니다!</h3>`;
        }

        resultHTML += `
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn" onclick="restartExam()" style="background: #28a745; padding: 15px 40px; font-size: 1.1em;">🔄 시험 다시 풀기</button>
            </div>
        `;
        
        document.getElementById('quiz-area').innerHTML = resultHTML;
        localStorage.setItem('cbt_21_1_finished', 'true');
    }

    function saveProgress() {
        localStorage.setItem('cbt_21_1_index', currentQuestionIndex);
        localStorage.setItem('cbt_21_1_answers', JSON.stringify(userAnswers));
        localStorage.setItem('cbt_21_1_finished', 'false');
    }

    function clearProgress() {
        localStorage.removeItem('cbt_21_1_index');
        localStorage.removeItem('cbt_21_1_answers');
        localStorage.removeItem('cbt_21_1_seconds');
        localStorage.removeItem('cbt_21_1_finished');
    }

    function restartExam() {
        clearProgress();
        location.reload();
    }

    function initExam() {
        clearProgress(); 

        buildOMRGrid();
        loadQuestion();
        startTimer();
    }

    /* --- 계산기 수식 안전 연산 엔진 --- */
    let calcExpression = '';
    const screen = document.getElementById('calc-screen');

    function appendCalc(val) {
        if (screen.value === '0' && !isNaN(val)) {
            calcExpression = val;
        } else {
            calcExpression += val;
        }
        screen.value = calcExpression;
    }

    function clearCalc() {
        calcExpression = '';
        screen.value = '0';
    }

    function calculate() {
        try {
            const safeSanitizedExpression = calcExpression.replace(/[^0-9+\-*/.]/g, '');
            if (!safeSanitizedExpression) {
                screen.value = '0';
                return;
            }

            const computeResult = new Function(`return (${safeSanitizedExpression})`)();
            
            if (computeResult === undefined || isNaN(computeResult) || !isFinite(computeResult)) {
                throw new Error();
            }
            
            screen.value = Number(computeResult.toFixed(4)); 
            calcExpression = screen.value;
        } catch (e) {
            screen.value = '오류';
            calcExpression = '';
        }
    }

    initExam();
</script>
